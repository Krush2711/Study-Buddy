<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup | StudyBuddy</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/signup.css">
    <link rel="stylesheet" href="../css/auth.css">
</head>

<body>
    <main class="auth-container">
        <section class="auth-card">
            <h1> Create Account</h1>

            <p class="subtitle">
                Join Study StudyBuddy Today
            </p>
            <form action="">

                <div class="input-group">
                    <label for="fullname"> Full Name :
                    </label>
                    <input type="text" id="fullname" placeholder="Enter your full name">

                </div>
                <div class="input-group">
                    <label for="email">Email : </label>
                    <input type="email" name="" id="email" placeholder="Enter your email">
                </div>

                <div class="input-group">
                    <label for="password">Password : </label>
                    <input type="password" id="password" placeholder="Create Password">
                </div>
                <p id="password-strenght">Password Strenght</p>
                <div class="input-group">
                    <label for="c-password">Confirm Password : </label>
                    <input type="password" id="c-password" placeholder="Confirm  Password">
                </div>
                <button type="submit">Create Account</button>
            </form>
            <p class="switch-page">Already have an account ? <a href="login.html">Login</a></p>
        </section>
    </main>
</body>

</html>
